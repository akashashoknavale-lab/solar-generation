<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid All Sites Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

select{
padding:6px;
}

.summary{
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
table-layout:fixed;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
word-wrap:break-word;
}

th{
background:#4CAF50;
color:white;
}

td.comment{
text-align:left;
white-space:normal;
word-break:break-word;
}

.chartGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
margin-top:20px;
}

.chartBox{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

canvas{
height:260px !important;
}

@media(max-width:900px){
.chartGrid{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<h1>Pyramid Phase 1,2,3 & Kombhalane Dashboard</h1>

<div class="topbar">

<div>
Select Month :
<select id="monthSelect" onchange="filterMonth()">
<option value="0">Jan</option>
<option value="1">Feb</option>
<option value="2">Mar</option>
<option value="3">Apr</option>
<option value="4">May</option>
<option value="5">Jun</option>
<option value="6">Jul</option>
<option value="7">Aug</option>
<option value="8">Sep</option>
<option value="9">Oct</option>
<option value="10">Nov</option>
<option value="11">Dec</option>
</select>
</div>

<div class="summary" id="monthSummary"></div>

</div>

<div class="chartGrid">

<div class="chartBox"><canvas id="chartP1"></canvas></div>
<div class="chartBox"><canvas id="chartP2"></canvas></div>
<div class="chartBox"><canvas id="chartP3"></canvas></div>
<div class="chartBox"><canvas id="chartK"></canvas></div>

</div>

<table>

<thead>

<tr>
<th rowspan="2">Date</th>

<th colspan="3">Pyramid Phase 1(6MW)</th>
<th colspan="3">Pyramid Phase 2(5MW)</th>
<th colspan="3">Pyramid Phase 3(1MW)</th>
<th colspan="2">Kombhalane</th>
</tr>

<tr>

<th>Gen</th>
<th>Avg</th>
<th>Comment</th>

<th>Gen</th>
<th>Avg</th>
<th>Comment</th>

<th>Gen</th>
<th>Avg</th>
<th>Comment</th>

<th>Gen</th>
<th>Avg</th>

</tr>

</thead>

<tbody id="dataBody"></tbody>

</table>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTH0I_aVV9u6YxZXWlL1GmI_qE5rSHZMJd3gL_ChSgSFa8kXlrC89j4LjoIxEutuGoTdJC9sOyjPGIy/pub?output=csv";

let rawData=[];
let charts={};

function parseDate(str){

let [d,m,y]=str.split("-").map(Number);
return new Date(y,m-1,d);

}

fetch(sheetURL)

.then(res=>res.text())

.then(csv=>{

const rows=csv.trim().split("\n");

rows.slice(1).forEach(r=>{

const c=r.split(",");

rawData.push({

date:c[0],
dObj:parseDate(c[0]),

p1g:Number(c[1])||0,
p1a:c[2]||"",
p1c:c[3]||"",

p2g:Number(c[4])||0,
p2a:c[5]||"",
p2c:c[6]||"",

p3g:Number(c[7])||0,
p3a:c[8]||"",
p3c:c[9]||"",

kg:Number(c[10])||0,
ka:c[11]||""

});

});

setDefaultMonth();
filterMonth();

});

function setDefaultMonth(){

const m=new Date().getMonth();
document.getElementById("monthSelect").value=m;

}

function filterMonth(){

const m=Number(document.getElementById("monthSelect").value);

const filtered=rawData.filter(d=>d.dObj.getMonth()===m);

populateTable(filtered);

drawCharts(filtered);

monthSummary(filtered);

}

function populateTable(data){

document.getElementById("dataBody").innerHTML=

data.map(d=>`

<tr>

<td>${d.date}</td>

<td>${d.p1g}</td>
<td>${d.p1a}</td>
<td class="comment">${d.p1c}</td>

<td>${d.p2g}</td>
<td>${d.p2a}</td>
<td class="comment">${d.p2c}</td>

<td>${d.p3g}</td>
<td>${d.p3a}</td>
<td class="comment">${d.p3c}</td>

<td>${d.kg}</td>
<td>${d.ka}</td>

</tr>

`).join("");

}

function createChart(id,label,data){

if(charts[id]) charts[id].destroy();

charts[id]=new Chart(document.getElementById(id),{

type:"bar",

data:{
labels:data.map(d=>d.date),

datasets:[{

label:label,
data:data.map(d=>d.gen),
backgroundColor:"rgba(54,162,235,0.7)",
borderRadius:4,
barPercentage:0.7,
categoryPercentage:0.8

}]

},

options:{

responsive:true,
maintainAspectRatio:false,

plugins:{

title:{
display:true,
text:label+" Generation",
font:{size:14}
},

legend:{
display:false
},

tooltip:{
enabled:true
},

datalabels:{
anchor:'end',
align:'top',
font:{size:10}
}

},

scales:{

x:{
grid:{display:false}
},

y:{
beginAtZero:true,
grid:{color:"#eee"}
}

}

},

plugins:[ChartDataLabels]

});

}

function drawCharts(data){

createChart("chartP1","Phase 1 (6MW)",data.map(d=>({date:d.date,gen:d.p1g})));

createChart("chartP2","Phase 2 (5MW)",data.map(d=>({date:d.date,gen:d.p2g})));

createChart("chartP3","Phase 3 (1MW)",data.map(d=>({date:d.date,gen:d.p3g})));

createChart("chartK","Kombhalane",data.map(d=>({date:d.date,gen:d.kg})));

}

function monthSummary(data){

let p1=0,p2=0,p3=0,k=0;

data.forEach(d=>{

p1+=d.p1g;
p2+=d.p2g;
p3+=d.p3g;
k+=d.kg;

});

document.getElementById("monthSummary").innerHTML=

`Month Generation → P1:${p1} | P2:${p2} | P3:${p3} | Komb:${k}`;

}

</script>

</body>
</html>
