<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid All Sites Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

<style>

body{
font-family:Arial;
padding:20px;
background:#f4f4f4;
}

h1{
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.summary{
font-weight:bold;
font-size:14px;
}

select{
padding:6px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
table-layout:fixed;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
word-wrap:break-word;
}

th{
background:#4CAF50;
color:white;
}

td.comment{
text-align:left;
white-space:normal;
word-break:break-word;
}

/* column width control */

th:nth-child(1),td:nth-child(1){width:90px}

th:nth-child(2),td:nth-child(2),
th:nth-child(5),td:nth-child(5),
th:nth-child(8),td:nth-child(8),
th:nth-child(11),td:nth-child(11){width:80px}

th:nth-child(3),td:nth-child(3),
th:nth-child(6),td:nth-child(6),
th:nth-child(9),td:nth-child(9),
th:nth-child(12),td:nth-child(12){width:80px}

th:nth-child(4),td:nth-child(4),
th:nth-child(7),td:nth-child(7),
th:nth-child(10),td:nth-child(10){width:200px}

/* charts collage */

.chartGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-top:20px;
}

.chartBox{
background:white;
padding:10px;
border-radius:8px;
height:260px;
}

@media(max-width:768px){

.chartGrid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<h1>Pyramid Phase 1,2,3 & Kombhalane Dashboard</h1>

<div class="topbar">

<div>
Select Month :
<select id="monthSelect"></select>
</div>

<div class="summary" id="monthSummary"></div>

</div>

<div class="chartGrid">

<div class="chartBox"><canvas id="chartP1"></canvas></div>
<div class="chartBox"><canvas id="chartP2"></canvas></div>
<div class="chartBox"><canvas id="chartP3"></canvas></div>
<div class="chartBox"><canvas id="chartK"></canvas></div>

</div>

<table>

<thead>

<tr>

<th rowspan="2">Date</th>

<th colspan="3">Pyramid Phase 1</th>
<th colspan="3">Pyramid Phase 2</th>
<th colspan="3">Pyramid Phase 3</th>
<th colspan="2">Kombhalane</th>

</tr>

<tr>

<th>Gen</th>
<th>Avg</th>
<th>Comment</th>

<th>Gen</th>
<th>Avg</th>
<th>Comment</th>

<th>Gen</th>
<th>Avg</th>
<th>Comment</th>

<th>Gen</th>
<th>Avg</th>

</tr>

</thead>

<tbody id="dataBody"></tbody>

</table>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTH0I_aVV9u6YxZXWlL1GmI_qE5rSHZMJd3gL_ChSgSFa8kXlrC89j4LjoIxEutuGoTdJC9sOyjPGIy/pub?output=csv";

let sheetData=[];
let charts={};

function parseDate(str){

const [d,m,y]=str.split("-").map(Number);
return new Date(y,m-1,d);

}

function populateMonthDropdown(){

const select=document.getElementById("monthSelect");

const months=[

"January","February","March","April","May","June",
"July","August","September","October","November","December"

];

select.innerHTML=months.map((m,i)=>
`<option value="${i}">${m}</option>`
).join("");

select.value=new Date().getMonth();

select.onchange=filterMonth;

}

function loadData(){

fetch(sheetURL)

.then(r=>r.text())

.then(csv=>{

sheetData=[];

const rows=csv.trim().split("\n");

rows.slice(1).forEach(row=>{

const c=row.split(",");

sheetData.push({

date:c[0],
jsDate:parseDate(c[0]),

p1g:Number(c[1])||0,
p1a:c[2]||"",
p1c:c[3]||"",

p2g:Number(c[4])||0,
p2a:c[5]||"",
p2c:c[6]||"",

p3g:Number(c[7])||0,
p3a:c[8]||"",
p3c:c[9]||"",

kg:Number(c[10])||0,
ka:c[11]||""

});

});

filterMonth();

});

}

function filterMonth(){

const m=Number(document.getElementById("monthSelect").value);

const data=sheetData.filter(d=>d.jsDate.getMonth()===m);

populateTable(data);

drawCharts(data);

monthSummary(data);

}

function populateTable(data){

document.getElementById("dataBody").innerHTML=

data.map(d=>`

<tr>

<td>${d.date}</td>

<td>${d.p1g}</td>
<td>${d.p1a}</td>
<td class="comment">${d.p1c}</td>

<td>${d.p2g}</td>
<td>${d.p2a}</td>
<td class="comment">${d.p2c}</td>

<td>${d.p3g}</td>
<td>${d.p3a}</td>
<td class="comment">${d.p3c}</td>

<td>${d.kg}</td>
<td>${d.ka}</td>

</tr>

`).join("");

}

function createChart(id,label,data,color){

if(charts[id]) charts[id].destroy();

charts[id]=new Chart(document.getElementById(id),{

type:"bar",

data:{
labels:data.map(d=>d.date),
datasets:[{
label:label,
data:data.map(d=>d.value),
backgroundColor:color
}]
},

options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
datalabels:{
anchor:'end',
align:'end',
font:{size:9}
}
},
scales:{y:{beginAtZero:true}}
},

plugins:[ChartDataLabels]

});

}

function drawCharts(data){

createChart("chartP1","Phase 1",
data.map(d=>({date:d.date,value:d.p1g})),
"rgba(75,192,192,0.6)");

createChart("chartP2","Phase 2",
data.map(d=>({date:d.date,value:d.p2g})),
"rgba(255,159,64,0.6)");

createChart("chartP3","Phase 3",
data.map(d=>({date:d.date,value:d.p3g})),
"rgba(153,102,255,0.6)");

createChart("chartK","Kombhalane",
data.map(d=>({date:d.date,value:d.kg})),
"rgba(255,99,132,0.6)");

}

function monthSummary(data){

let p1=0,p2=0,p3=0,k=0;

data.forEach(d=>{

p1+=d.p1g;
p2+=d.p2g;
p3+=d.p3g;
k+=d.kg;

});

document.getElementById("monthSummary").innerHTML=

`Month Generation → P1:${p1} | P2:${p2} | P3:${p3} | Komb:${k}`;

}

populateMonthDropdown();
loadData();

/* auto refresh every 5 minutes */

setInterval(loadData,300000);

</script>

</body>
</html>
