<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid All Sites Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

<style>

body{
font-family:Arial;
padding:20px;
background:#f4f4f4;
}

h1{
text-align:center;
}

/* controls */

.control-panel{
text-align:center;
margin-bottom:15px;
}

.control-panel input{
width:80px;
padding:5px;
}

/* table */

#dataTable{
width:100%;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#4CAF50;
color:white;
}

/* charts */

.chart-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
margin-top:20px;
}

.chart-box{
background:white;
padding:10px;
border-radius:8px;
height:260px;
}

</style>
</head>

<body>

<h1>Pyramid Phase 1,2,3 & Kombhalane Dashboard</h1>

<div class="control-panel">

Table Width %
<input type="number" id="tableWidth" value="100">

Row Height
<input type="number" id="rowHeight" value="30">

Font Size
<input type="number" id="fontSize" value="14">

<button onclick="resizeTable()">Apply</button>

</div>


<!-- charts -->

<div class="chart-grid">
<div class="chart-box"><canvas id="chartP1"></canvas></div>
<div class="chart-box"><canvas id="chartP2"></canvas></div>
<div class="chart-box"><canvas id="chartP3"></canvas></div>
<div class="chart-box"><canvas id="chartK"></canvas></div>
</div>


<table id="dataTable">

<thead>

<tr>

<th rowspan="2">Date</th>

<th colspan="3">Pyramid Phase 1</th>
<th colspan="3">Pyramid Phase 2</th>
<th colspan="3">Pyramid Phase 3</th>
<th colspan="2">Kombhalane</th>

</tr>

<tr>

<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th>

</tr>

</thead>

<tbody id="dataBody"></tbody>

</table>

<script>

const sheetURL="https://docs.google.com/spreadsheets/d/e/2PACX-1vTH0I_aVV9u6YxZXWlL1GmI_qE5rSHZMJd3gL_ChSgSFa8kXlrC89j4LjoIxEutuGoTdJC9sOyjPGIy/pub?output=csv";

let sheetData=[];
let charts={};

function parseDate(str){

const [d,m,y]=str.split("-").map(Number);
return new Date(y,m-1,d);

}

fetch(sheetURL)

.then(r=>r.text())

.then(csv=>{

const rows=csv.trim().split("\n");

rows.slice(1).forEach(row=>{

const c=row.split(",");

sheetData.push({

date:c[0],

p1g:Number(c[1])||0,
p1a:c[2]||"",
p1c:c[3]||"",

p2g:Number(c[4])||0,
p2a:c[5]||"",
p2c:c[6]||"",

p3g:Number(c[7])||0,
p3a:c[8]||"",
p3c:c[9]||"",

kg:Number(c[10])||0,
ka:c[11]||""

});

});

populateTable();
drawCharts();

});


function populateTable(){

document.getElementById("dataBody").innerHTML=

sheetData.map(d=>`

<tr>

<td>${d.date}</td>

<td>${d.p1g}</td>
<td>${d.p1a}</td>
<td>${d.p1c}</td>

<td>${d.p2g}</td>
<td>${d.p2a}</td>
<td>${d.p2c}</td>

<td>${d.p3g}</td>
<td>${d.p3a}</td>
<td>${d.p3c}</td>

<td>${d.kg}</td>
<td>${d.ka}</td>

</tr>

`).join("");

}



function drawCharts(){

createChart("chartP1","Phase 1",sheetData.map(d=>d.p1g),"rgba(75,192,192,0.6)");
createChart("chartP2","Phase 2",sheetData.map(d=>d.p2g),"rgba(255,159,64,0.6)");
createChart("chartP3","Phase 3",sheetData.map(d=>d.p3g),"rgba(153,102,255,0.6)");
createChart("chartK","Kombhalane",sheetData.map(d=>d.kg),"rgba(255,99,132,0.6)");

}


function createChart(id,label,data,color){

charts[id]=new Chart(document.getElementById(id),{

type:"bar",

data:{

labels:sheetData.map(d=>d.date),

datasets:[{

label:label,

data:data,

backgroundColor:color

}]

},

options:{

responsive:true,
maintainAspectRatio:false,

plugins:{

datalabels:{

anchor:'end',
align:'end',
font:{size:9}

}

}

},

plugins:[ChartDataLabels]

});

}



function resizeTable(){

const width=document.getElementById("tableWidth").value;
const row=document.getElementById("rowHeight").value;
const font=document.getElementById("fontSize").value;

const table=document.getElementById("dataTable");

table.style.width=width+"%";

document.querySelectorAll("#dataTable td,#dataTable th").forEach(e=>{

e.style.height=row+"px";
e.style.fontSize=font+"px";

});

}

</script>

</body>
</html>
