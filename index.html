<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Solar Monitoring Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#f2f5f7;
    }

    .header{
      background:#0f172a;
      color:white;
      padding:15px;
      font-size:28px;
      font-weight:bold;
      text-align:center;
    }

    .container{
      padding:20px;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:30px;
    }

    .card{
      background:white;
      border-radius:15px;
      padding:20px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .card-title{
      font-size:18px;
      color:#555;
      margin-bottom:10px;
    }

    .card-value{
      font-size:32px;
      font-weight:bold;
      color:#0f172a;
    }

    .chart-box{
      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      margin-bottom:30px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      background:white;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    th{
      background:#0f172a;
      color:white;
      padding:12px;
    }

    td{
      padding:10px;
      border-bottom:1px solid #ddd;
      text-align:center;
    }

    tr:hover{
      background:#f5f5f5;
    }

  </style>
</head>
<body>

<div class="header">
  Solar Remote Monitoring Dashboard
</div>

<div class="container">

  <div class="cards">

    <div class="card">
      <div class="card-title">Current Power</div>
      <div class="card-value" id="power">0 kW</div>
    </div>

    <div class="card">
      <div class="card-title">Daily Energy</div>
      <div class="card-value" id="energy">0 kWh</div>
    </div>

    <div class="card">
      <div class="card-title">Voltage</div>
      <div class="card-value" id="voltage">0 V</div>
    </div>

    <div class="card">
      <div class="card-title">Temperature</div>
      <div class="card-value" id="temp">0 °C</div>
    </div>

  </div>

  <div class="chart-box">
    <canvas id="powerChart"></canvas>
  </div>

  <div class="chart-box">
    <canvas id="energyChart"></canvas>
  </div>

  <table id="dataTable">
    <thead>
      <tr>
        <th>Date Time</th>
        <th>Inv ID</th>
        <th>Power</th>
        <th>Voltage</th>
        <th>Temperature</th>
      </tr>
    </thead>
    <tbody>

    </tbody>
  </table>

</div>

<script>

const CSV_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnS3pL3JyabVpduc3gZ1JwPUG5LZvw2g4khUwndVmpyBYH91CnS23Y1nVjFWtscBFc4yTfPLDNyzkLv_lkxfx9RkRIJoOETt4WOSwuQG_nSoTVcHymk3CVJm7yUPWTp76Zi2TN-ntmjrTfcmGkUwNTCFs4Md2xxWvua6yiIzsl2qJAlbzM6NQkim_SaMI6X4GDRlSp31g9zB4s1i-HTIyGX6173pj0sMVsDt62Uda5kQZ-hBw1f6_BsWseHiMWkFb2dP228UirJZ9IYTVawvunewO7Lgtw&lib=MCz00kSXntMNG2j8lNix72WIZvkK2cN4n";

async function loadData(){

  const response = await fetch(CSV_URL);
  const csvText = await response.text();

  const rows = csvText.trim().split("\n");

  let labels = [];
  let powerData = [];
  let energyData = [];

  const tbody = document.querySelector("#dataTable tbody");

  tbody.innerHTML = "";

  for(let i=1;i<rows.length;i++){

    const cols = rows[i].split(",");

    if(cols.length < 10) continue;

    const datetime = cols[0];
    const invId = cols[1];

    const power = parseFloat(cols[8]) || 0;
    const voltage = parseFloat(cols[5]) || 0;
    const temp = parseFloat(cols[4]) || 0;
    const energy = parseFloat(cols[2]) || 0;

    labels.push(datetime);
    powerData.push(power);
    energyData.push(energy);

    if(i == rows.length - 1){

      document.getElementById("power").innerText = power + " kW";
      document.getElementById("energy").innerText = energy + " kWh";
      document.getElementById("voltage").innerText = voltage + " V";
      document.getElementById("temp").innerText = temp + " °C";

    }

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${datetime}</td>
      <td>${invId}</td>
      <td>${power}</td>
      <td>${voltage}</td>
      <td>${temp}</td>
    `;

    tbody.appendChild(tr);

  }

  createPowerChart(labels,powerData);
  createEnergyChart(labels,energyData);

}

function createPowerChart(labels,data){

  new Chart(document.getElementById("powerChart"),{
    type:'line',
    data:{
      labels:labels,
      datasets:[{
        label:'Power kW',
        data:data,
        borderWidth:2,
        tension:0.3
      }]
    }
  });

}

function createEnergyChart(labels,data){

  new Chart(document.getElementById("energyChart"),{
    type:'bar',
    data:{
      labels:labels,
      datasets:[{
        label:'Energy kWh',
        data:data,
        borderWidth:1
      }]
    }
  });

}

loadData();

// Auto refresh every 30 sec
setInterval(loadData,30000);

</script>

</body>
</html>
