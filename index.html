<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid All Sites Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f4f4; }
h1 { text-align:center; }

.search-container { text-align:center; margin-bottom:20px; }

input { padding:8px; width:200px; }
button { padding:8px 15px; background:#4CAF50; color:white; border:none; cursor:pointer; }

table { width:100%; border-collapse:collapse; background:white; margin-top:20px; }
th, td { border:1px solid #ddd; padding:8px; text-align:center; }
th { background:#4CAF50; color:white; }

.result { margin-top:15px; font-weight:bold; text-align:center; }

/* ✅ COLLAGE GRID */
.chart-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:20px;
    margin-top:20px;
}

.chart-box{
    background:white;
    padding:10px;
    border-radius:8px;
    height:260px;
}

/* mobile */
@media(max-width:768px){
    .chart-grid{
        grid-template-columns: 1fr;
    }
    .chart-box{
        height:240px;
    }
}
</style>
</head>

<body>

<h1>Pyramid Phase 1,2,3 & Kombhalane Dashboard</h1>

<div class="search-container">
    <input type="text" id="searchDate" placeholder="Enter date (21-1-2026)">
    <button onclick="searchData()">Search</button>
</div>

<!-- ✅ COLLAGE OF 4 CHARTS -->
<div class="chart-grid">

    <div class="chart-box">
        <canvas id="chartP1"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="chartP2"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="chartP3"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="chartK"></canvas>
    </div>

</div>

<div class="result" id="resultMessage"></div>

<table>
<thead>
<tr>
<th rowspan="2">Date</th>

<th colspan="3">Pyramid Phase 1</th>
<th colspan="3">Pyramid Phase 2</th>
<th colspan="3">Pyramid Phase 3</th>
<th colspan="2">Pyramid Kombhalane</th>
</tr>

<tr>
<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th>
</tr>
</thead>
<tbody id="dataBody"></tbody>
</table>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTH0I_aVV9u6YxZXWlL1GmI_qE5rSHZMJd3gL_ChSgSFa8kXlrC89j4LjoIxEutuGoTdJC9sOyjPGIy/pub?output=csv";

let sheetData = [];
let charts = {};

function parseDate(str){
    const [d,m,y] = str.split("-").map(Number);
    return new Date(y,m-1,d);
}

// ✅ yesterday
function getYesterday(){
    const d = new Date();
    d.setDate(d.getDate()-1);
    d.setHours(0,0,0,0);
    return d;
}

fetch(sheetURL)
.then(res=>res.text())
.then(csv=>{
    const rows = csv.trim().split("\n");

    rows.slice(1).forEach(row=>{
        const cols = row.split(",");

        sheetData.push({
            date: cols[0],
            jsDate: parseDate(cols[0]),
            p1g: Number(cols[1])||0,
            p1a: cols[2]||"",
            p1c: cols[3]||"",
            p2g: Number(cols[4])||0,
            p2a: cols[5]||"",
            p2c: cols[6]||"",
            p3g: Number(cols[7])||0,
            p3a: cols[8]||"",
            p3c: cols[9]||"",
            kg: Number(cols[10])||0,
            ka: cols[11]||""
        });
    });

    populateTable();
    drawAllCharts();
});

function populateTable(){
    document.getElementById("dataBody").innerHTML =
    sheetData.map(d=>`
        <tr>
        <td>${d.date}</td>

        <td>${d.p1g}</td><td>${d.p1a}</td><td>${d.p1c}</td>
        <td>${d.p2g}</td><td>${d.p2a}</td><td>${d.p2c}</td>
        <td>${d.p3g}</td><td>${d.p3a}</td><td>${d.p3c}</td>
        <td>${d.kg}</td><td>${d.ka}</td>
        </tr>
    `).join("");
}

// ✅ last 30 days till yesterday
function getFilteredData(){

    const yesterday = getYesterday();

    const valid = sheetData
        .filter(d=>d.jsDate <= yesterday)
        .sort((a,b)=>a.jsDate - b.jsDate);

    return valid.slice(-30);
}

function createChart(canvasId,label,data,color){

    if(charts[canvasId]) charts[canvasId].destroy();

    charts[canvasId] = new Chart(document.getElementById(canvasId),{
        type:"bar",
        data:{
            labels:data.map(d=>d.date),
            datasets:[{
                label:label,
                data:data.map(d=>d.value),
                backgroundColor:color
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{
                legend:{ display:true },
                datalabels:{
                    anchor:'end',
                    align:'end',
                    font:{ size:9 }
                }
            },
            scales:{
                y:{ beginAtZero:true }
            }
        },
        plugins:[ChartDataLabels]
    });
}

function drawAllCharts(){

    const last30 = getFilteredData();

    createChart(
        "chartP1",
        "Phase 1 Generation",
        last30.map(d=>({date:d.date,value:d.p1g})),
        "rgba(75,192,192,0.6)"
    );

    createChart(
        "chartP2",
        "Phase 2 Generation",
        last30.map(d=>({date:d.date,value:d.p2g})),
        "rgba(255,159,64,0.6)"
    );

    createChart(
        "chartP3",
        "Phase 3 Generation",
        last30.map(d=>({date:d.date,value:d.p3g})),
        "rgba(153,102,255,0.6)"
    );

    createChart(
        "chartK",
        "Kombhalane Generation",
        last30.map(d=>({date:d.date,value:d.kg})),
        "rgba(255,99,132,0.6)"
    );
}

function searchData(){
    const date = document.getElementById("searchDate").value.trim();
    const r = sheetData.find(d=>d.date===date);

    document.getElementById("resultMessage").innerHTML =
    r
    ? `P1: ${r.p1g} | P2: ${r.p2g} | P3: ${r.p3g} | Komb: ${r.kg}`
    : "No data found";
}

</script>
</body>
</html>
