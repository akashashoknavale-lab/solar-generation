<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid All Sites Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f4f4; }
h1 { text-align:center; }
.search-container { text-align:center; margin-bottom:20px; }
input { padding:8px; width:200px; }
button { padding:8px 15px; background:#4CAF50; color:white; border:none; cursor:pointer; }
table { width:100%; border-collapse:collapse; background:white; margin-top:20px; }
th, td { border:1px solid #ddd; padding:8px; text-align:center; }
th { background:#4CAF50; color:white; }
canvas { background:white; padding:10px; margin-top:20px; }
.result { margin-top:15px; font-weight:bold; text-align:center; }
</style>
</head>

<body>

<h1>Pyramid Phase 1,2,3 & Kombhalane Dashboard</h1>

<div class="search-container">
    <input type="text" id="searchDate" placeholder="Enter date (21-1-2026)">
    <button onclick="searchData()">Search</button>
</div>

<canvas id="generationChart" height="120"></canvas>

<div class="result" id="resultMessage"></div>

<table>
<thead>
<tr>
<th rowspan="2">Date</th>

<th colspan="3">Pyramid Phase 1</th>
<th colspan="3">Pyramid Phase 2</th>
<th colspan="3">Pyramid Phase 3</th>
<th colspan="2">Pyramid Kombhalane</th>
</tr>

<tr>
<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th>
</tr>
</thead>
<tbody id="dataBody"></tbody>
</table>

<script>

const sheetURL = "YOUR_GOOGLE_SHEET_CSV_LINK_HERE";

let sheetData = [];
let chart;

function parseDate(str){
    const [d,m,y] = str.split("-").map(Number);
    return new Date(y,m-1,d);
}

fetch(sheetURL)
.then(res=>res.text())
.then(csv=>{
    const rows = csv.trim().split("\n");

    rows.slice(1).forEach(row=>{
        const cols = row.split(",");

        sheetData.push({
            date: cols[0],
            p1g: Number(cols[1])||0,
            p1a: cols[2]||"",
            p1c: cols[3]||"",
            p2g: Number(cols[4])||0,
            p2a: cols[5]||"",
            p2c: cols[6]||"",
            p3g: Number(cols[7])||0,
            p3a: cols[8]||"",
            p3c: cols[9]||"",
            kg: Number(cols[10])||0,
            ka: cols[11]||""
        });
    });

    populateTable();
    drawChart();
});

function populateTable(){
    document.getElementById("dataBody").innerHTML =
    sheetData.map(d=>`
        <tr>
        <td>${d.date}</td>

        <td>${d.p1g}</td><td>${d.p1a}</td><td>${d.p1c}</td>
        <td>${d.p2g}</td><td>${d.p2a}</td><td>${d.p2c}</td>
        <td>${d.p3g}</td><td>${d.p3a}</td><td>${d.p3c}</td>
        <td>${d.kg}</td><td>${d.ka}</td>

        </tr>
    `).join("");
}

function drawChart(highlight=null){

    const last30 = sheetData.slice(-30);

    const labels = last30.map(d=>d.date);

    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("generationChart"),{
        type:"bar",
        data:{
            labels:labels,
            datasets:[
                {
                    label:"Phase 1",
                    data:last30.map(d=>d.p1g),
                    backgroundColor:"rgba(75,192,192,0.6)"
                },
                {
                    label:"Phase 2",
                    data:last30.map(d=>d.p2g),
                    backgroundColor:"rgba(255,159,64,0.6)"
                },
                {
                    label:"Phase 3",
                    data:last30.map(d=>d.p3g),
                    backgroundColor:"rgba(153,102,255,0.6)"
                },
                {
                    label:"Kombhalane",
                    data:last30.map(d=>d.kg),
                    backgroundColor:"rgba(255,99,132,0.6)"
                }
            ]
        },
        options:{
            responsive:true,
            plugins:{
                datalabels:{
                    anchor:'end',
                    align:'end'
                }
            },
            scales:{
                y:{ beginAtZero:true }
            }
        },
        plugins:[ChartDataLabels]
    });
}

function searchData(){
    const date = document.getElementById("searchDate").value.trim();
    const r = sheetData.find(d=>d.date===date);

    document.getElementById("resultMessage").innerHTML =
    r ? `
    P1: ${r.p1g} | P2: ${r.p2g} | P3: ${r.p3g} | Komb: ${r.kg}
    ` : "No data found";
}

</script>
</body>
</html>
