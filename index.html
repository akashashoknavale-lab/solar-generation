<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pyramid All Sites Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

<style>
body { font-family: Arial; padding:20px; background:#f4f4f4; }
h1 { text-align:center; }

.search-container { text-align:center; margin-bottom:15px; }

input, select { padding:8px; width:200px; margin-right:10px; }
button { padding:8px 15px; background:#4CAF50; color:white; border:none; cursor:pointer; }

table { width:100%; border-collapse:collapse; background:white; margin-top:20px; }
th, td { border:1px solid #ddd; padding:8px; text-align:center; }
th { background:#4CAF50; color:white; }

.result { margin-top:15px; font-weight:bold; text-align:center; }

/* collage */
.chart-grid{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:20px;
    margin-top:20px;
}

.chart-box{
    background:white;
    padding:10px;
    border-radius:8px;
    height:260px;
}

@media(max-width:768px){
    .chart-grid{ grid-template-columns: 1fr; }
    .chart-box{ height:240px; }
}
</style>
</head>

<body>

<h1>Pyramid Phase 1,2,3 & Kombhalane Dashboard</h1>

<div class="search-container">
    <input type="text" id="searchDate" placeholder="Enter date (21-1-2026)">
    <select id="monthSelect"></select>
    <button onclick="searchData()">Search</button>
</div>

<!-- charts collage -->
<div class="chart-grid">
    <div class="chart-box"><canvas id="chartP1"></canvas></div>
    <div class="chart-box"><canvas id="chartP2"></canvas></div>
    <div class="chart-box"><canvas id="chartP3"></canvas></div>
    <div class="chart-box"><canvas id="chartK"></canvas></div>
</div>

<div class="result" id="resultMessage"></div>

<table>
<thead>
<tr>
<th rowspan="2">Date</th>
<th colspan="3">Pyramid Phase 1</th>
<th colspan="3">Pyramid Phase 2</th>
<th colspan="3">Pyramid Phase 3</th>
<th colspan="2">Pyramid Kombhalane</th>
</tr>
<tr>
<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th><th>Comment</th>
<th>Gen</th><th>Avg</th>
</tr>
</thead>
<tbody id="dataBody"></tbody>
</table>

<script>

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTH0I_aVV9u6YxZXWlL1GmI_qE5rSHZMJd3gL_ChSgSFa8kXlrC89j4LjoIxEutuGoTdJC9sOyjPGIy/pub?output=csv";

let sheetData = [];
let charts = {};

function parseDate(str){
    const [d,m,y] = str.split("-").map(Number);
    return new Date(y,m-1,d);
}

function getYesterday(){
    const d = new Date();
    d.setDate(d.getDate()-1);
    d.setHours(0,0,0,0);
    return d;
}

// populate month dropdown
function populateMonthDropdown(){
    const select = document.getElementById("monthSelect");

    const months = [...new Set(sheetData.map(d =>
        `${d.jsDate.getFullYear()}-${d.jsDate.getMonth()+1}`
    ))].sort().reverse();

    select.innerHTML = months.map(m=>{
        const [y,mo] = m.split("-");
        const name = new Date(y,mo-1).toLocaleString('default',{month:'long'});
        return `<option value="${m}">${name} ${y}</option>`;
    }).join("");

    select.onchange = drawAllCharts;
}

fetch(sheetURL)
.then(r=>r.text())
.then(csv=>{
    const rows = csv.trim().split("\n");

    rows.slice(1).forEach(row=>{
        const c = row.split(",");

        sheetData.push({
            date:c[0],
            jsDate:parseDate(c[0]),
            p1g:Number(c[1])||0,
            p1a:c[2]||"",
            p1c:c[3]||"",
            p2g:Number(c[4])||0,
            p2a:c[5]||"",
            p2c:c[6]||"",
            p3g:Number(c[7])||0,
            p3a:c[8]||"",
            p3c:c[9]||"",
            kg:Number(c[10])||0,
            ka:c[11]||""
        });
    });

    populateTable();
    populateMonthDropdown();
    drawAllCharts();
});

function populateTable(){
    document.getElementById("dataBody").innerHTML =
    sheetData.map(d=>`
        <tr>
        <td>${d.date}</td>
        <td>${d.p1g}</td><td>${d.p1a}</td><td>${d.p1c}</td>
        <td>${d.p2g}</td><td>${d.p2a}</td><td>${d.p2c}</td>
        <td>${d.p3g}</td><td>${d.p3a}</td><td>${d.p3c}</td>
        <td>${d.kg}</td><td>${d.ka}</td>
        </tr>
    `).join("");
}

// month filter + yesterday limit + last 30 days
function getFilteredData(){

    const selected = document.getElementById("monthSelect").value;
    const yesterday = getYesterday();

    if(!selected) return [];

    const [y,m] = selected.split("-").map(Number);

    const filtered = sheetData
        .filter(d =>
            d.jsDate.getFullYear()===y &&
            d.jsDate.getMonth()+1===m &&
            d.jsDate <= yesterday
        )
        .sort((a,b)=>a.jsDate-b.jsDate);

    return filtered.slice(-30);
}

function createChart(id,label,data,color){

    if(charts[id]) charts[id].destroy();

    charts[id] = new Chart(document.getElementById(id),{
        type:"bar",
        data:{
            labels:data.map(d=>d.date),
            datasets:[{
                label:label,
                data:data.map(d=>d.value),
                backgroundColor:color
            }]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{
                datalabels:{
                    anchor:'end',
                    align:'end',
                    font:{ size:9 }
                }
            },
            scales:{ y:{ beginAtZero:true } }
        },
        plugins:[ChartDataLabels]
    });
}

function drawAllCharts(){

    const last30 = getFilteredData();

    createChart("chartP1","Phase 1 Generation",
        last30.map(d=>({date:d.date,value:d.p1g})),
        "rgba(75,192,192,0.6)");

    createChart("chartP2","Phase 2 Generation",
        last30.map(d=>({date:d.date,value:d.p2g})),
        "rgba(255,159,64,0.6)");

    createChart("chartP3","Phase 3 Generation",
        last30.map(d=>({date:d.date,value:d.p3g})),
        "rgba(153,102,255,0.6)");

    createChart("chartK","Kombhalane Generation",
        last30.map(d=>({date:d.date,value:d.kg})),
        "rgba(255,99,132,0.6)");
}

function searchData(){
    const date = document.getElementById("searchDate").value.trim();
    const r = sheetData.find(d=>d.date===date);

    document.getElementById("resultMessage").innerHTML =
        r ? `P1: ${r.p1g} | P2: ${r.p2g} | P3: ${r.p3g} | Komb: ${r.kg}`
          : "No data found";
}

</script>
</body>
</html>
